name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod

      component:
        description: "Choose Terraform component"
        required: true
        default: "vpc"
        type: choice
        options:
          - vpc
          - ec2
          - rds

      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: terraform/components/${{ github.event.inputs.component }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -var-file="../../backend/${{ github.event.inputs.environment }}.tfvars"

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -var-file="../../backend/${{ github.event.inputs.environment }}.tfvars" -auto-approve

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file="../../backend/${{ github.event.inputs.environment }}.tfvars" -auto-approve